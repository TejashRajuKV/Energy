services:
  # ─── BACKEND API ──────────────────────────────────────────
  - type: web
    name: ghostload-backend
    env: node
    region: ohio
    plan: free
    rootDir: ghostload-backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ghostload-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      # The frontend URL for CORS / Email links. You can update this after the frontend deploys.
      - key: FRONTEND_URL
        value: https://ghostload-frontend.onrender.com

  # ─── FRONTEND APP ─────────────────────────────────────────
  - type: web
    name: ghostload-frontend
    env: static
    region: ohio
    plan: free
    rootDir: ghostload-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ghostload-backend
          envVarKey: RENDER_EXTERNAL_URL
    # Ensure client-side routing works by rewriting all missing paths to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ─── POSTGRESQL DB ────────────────────────────────────────
  - name: ghostload-db
    databaseName: ghostload
    user: ghostload_admin
    region: ohio
    plan: free
